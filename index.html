<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div class="animation-wrapper">
            <svg class="sunny-moony" viewBox="0 0 200 200">
                <g class="sun">
                    <circle cx="100" cy="100" r="30" fill="#FFD700" />
                    <line x1="100" y1="50" x2="100" y2="30" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="100" y1="150" x2="100" y2="170" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="50" y1="100" x2="30" y2="100" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="150" y1="100" x2="170" y2="100" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="65" y1="65" x2="50" y2="50" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="135" y1="135" x2="150" y2="150" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="65" y1="135" x2="50" y2="150" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                    <line x1="135" y1="65" x2="150" y2="50" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
                </g>
                <g class="moon" style="opacity:0;">
                    <path d="M100 70 A40 40 0 1 0 130 130 A30 30 0 1 1 100 70" fill="#F4F4F4" />
                </g>
            </svg>
            <div class="clouds">
                <div class="cloud-cluster">
                    <div class="cloud-part"></div>
                    <div class="cloud-part"></div>
                    <div class="cloud-part"></div>
                    <div class="cloud-part"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
